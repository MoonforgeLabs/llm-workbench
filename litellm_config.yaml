# LiteLLM Proxy 配置
# 借鉴 moonforge 的任务分类 + llm-workbench 的云端能力
# 策略: 简单任务本地优先，复杂任务云端优先
# 付费模型开关: LITELLM_ENABLE_PAID_MODELS=false (默认关闭)

model_list:
  # ═══════════════════════════════════════════════════════════════
  # 本地模型 (Ollama @ 11434) —— 完全免费，本地算力
  # ═══════════════════════════════════════════════════════════════
  - model_name: devstral
    litellm_params:
      model: ollama/devstral
      api_base: http://127.0.0.1:11434
  
  - model_name: gemma4
    litellm_params:
      model: ollama/gemma4:26b
      api_base: http://127.0.0.1:11434
  
  - model_name: qwen3
    litellm_params:
      model: ollama/qwen3:32b
      api_base: http://127.0.0.1:11434
  
  - model_name: ornith-35b
    litellm_params:
      model: ollama/ornith:35b
      api_base: http://127.0.0.1:11434
  
  - model_name: deepseek-r1-14b
    litellm_params:
      model: ollama/deepseek-r1:14b
      api_base: http://127.0.0.1:11434
  
  - model_name: nemotron-ultra
    litellm_params:
      model: ollama/nemotron3:ultra
      api_base: http://127.0.0.1:11434

  # ═══════════════════════════════════════════════════════════════
  # 国内免费直连 (SiliconFlow / 智谱) —— 需 Key，已配置，免费额度
  # ═══════════════════════════════════════════════════════════════
  - model_name: sf-deepseek-r1
    litellm_params:
      model: siliconflow/Pro/deepseek-ai/DeepSeek-R1
      api_base: https://api.siliconflow.cn/v1
      api_key: ${SILICONFLOW_API_KEY}
  
  - model_name: sf-qwen2.5-72b
    litellm_params:
      model: siliconflow/Qwen/Qwen2.5-72B-Instruct
      api_base: https://api.siliconflow.cn/v1
      api_key: ${SILICONFLOW_API_KEY}
  
  - model_name: glm-4-flash
    litellm_params:
      model: zhipu/glm-4-flash
      api_base: https://open.bigmodel.cn/api/paas/v4
      api_key: ${ZHIPU_API_KEY}
  
  - model_name: glm-4.7-flash
    litellm_params:
      model: zhipu/glm-4.7-flash
      api_base: https://open.bigmodel.cn/api/paas/v4
      api_key: ${ZHIPU_API_KEY}

  # ═══════════════════════════════════════════════════════════════
  # 海外免费模型 — 需 OPENROUTER_API_KEY，限流 20 RPM / 200 RPD
  # ═══════════════════════════════════════════════════════════════
  - model_name: qwen3-coder-free
    litellm_params:
      model: openrouter/qwen/qwen3-coder:free
      api_key: ${OPENROUTER_API_KEY}
  
  - model_name: qwen3-coder
    litellm_params:
      model: openrouter/qwen/qwen3-coder
      api_key: ${OPENROUTER_API_KEY}
  
  - model_name: nemotron-ultra-free
    litellm_params:
      model: openrouter/nvidia/nemotron-3-ultra:free
      api_key: ${OPENROUTER_API_KEY}
  
  - model_name: gpt-oss-120b-free
    litellm_params:
      model: openrouter/microsoft/gpt-oss-120b:free
      api_key: ${OPENROUTER_API_KEY}
  
  - model_name: gemma4-free
    litellm_params:
      model: openrouter/google/gemma-4-31b:free
      api_key: ${OPENROUTER_API_KEY}
  
  - model_name: llama3.3-70b-free
    litellm_params:
      model: openrouter/meta-llama/llama-3.3-70b-instruct:free
      api_key: ${OPENROUTER_API_KEY}

  # ═══════════════════════════════════════════════════════════════
  # 付费模型 —— 仅当 LITELLM_ENABLE_PAID_MODELS=true 时启用
  # ═══════════════════════════════════════════════════════════════
  # 以下模型通过环境变量 LITELLM_ENABLE_PAID_MODELS 控制是否注册
  # 默认 false (不注册)，设为 true 才会加入模型列表和降级链
  #
  # 启用方式:
  #   export LITELLM_ENABLE_PAID_MODELS=true
  #   source litellm_env.sh && litellm --config litellm_config.yaml
  #
  # 注: LiteLLM 不支持 YAML 里直接写条件判断，需通过启动脚本动态生成配置
  # 见 start-litellm.sh 脚本

router_settings:
  routing_strategy: usage-based-routing-v2
  num_retries: 3
  timeout: 180
  retry_after: 5
  context_window_fallbacks:
    - claude-sonnet: [claude-haiku, sf-qwen2.5-72b]
    - gpt-5.5: [claude-sonnet, sf-qwen2.5-72b]
    - gemini-pro: [gemini-flash, sf-qwen2.5-72b]
  fallbacks:
    # ─── 任务路由降级链 (本地优先 → 国内免费 → 海外免费 → 付费) ───
    # coding: devstral → qwen3-coder → sf-qwen2.5-72b → [claude-sonnet 付费]
    - task-coding: [qwen3-coder, qwen3-coder-free, sf-qwen2.5-72b, ${PAID_CLAUDE_SONNET}]
    # general: gemma4 → gemma4-free → nemotron-free → [claude-sonnet 付费]
    - task-general: [gemma4, gemma4-free, nemotron-ultra-free, ${PAID_CLAUDE_SONNET}]
    # chinese: qwen3 → sf-qwen2.5-72b → glm-4.7-flash → [claude-sonnet 付费]
    - task-chinese: [qwen3, sf-qwen2.5-72b, glm-4.7-flash, ${PAID_CLAUDE_SONNET}]
    # english: ornith-35b → nemotron-free → gpt-oss-120b-free → [claude-opus 付费]
    - task-english: [ornith-35b, nemotron-ultra-free, gpt-oss-120b-free, ${PAID_CLAUDE_OPUS}]
    # fast: deepseek-r1-14b → sf-deepseek-r1 → glm-4-flash → qwen3-coder-free
    - task-fast: [deepseek-r1-14b, sf-deepseek-r1, glm-4-flash, qwen3-coder-free]

    # ─── 兼容旧命令 / 直接模型名调用 ───
    # 默认免费入口: 国内免费 → 海外免费 → 本地
    - free-auto: [nemotron-ultra-free, gpt-oss-120b-free, qwen3-coder-free, sf-qwen2.5-72b, glm-4.7-flash, devstral, gemma4, ornith-35b]
    # 付费 → 国内免费 → 海外免费 → 本地 (需开启付费开关)
    - gpt-5.5: [${PAID_GPT_5_5}, ${PAID_CLAUDE_SONNET}, sf-qwen2.5-72b, qwen3-coder-free, devstral]
    - claude-sonnet: [${PAID_CLAUDE_SONNET}, ${PAID_GPT_5_5}, sf-qwen2.5-72b, nemotron-ultra-free, devstral]
    # 国内免费互备 → 海外 → 本地
    - sf-deepseek-r1: [sf-qwen2.5-72b, glm-4-flash, qwen3-coder-free, deepseek-r1-14b]
    - sf-qwen2.5-72b: [sf-deepseek-r1, glm-4-flash, qwen3-coder-free, qwen3]
    - glm-4-flash: [glm-4.7-flash, sf-qwen2.5-72b, qwen3-coder-free, qwen3]
    - glm-4.7-flash: [glm-4-flash, sf-deepseek-r1, qwen3-coder-free, qwen3]
    # 海外免费互备 → 本地
    - qwen3-coder-free: [nemotron-ultra-free, gpt-oss-120b-free, devstral]
    - nemotron-ultra-free: [qwen3-coder-free, gpt-oss-120b-free, devstral]
    - gpt-oss-120b-free: [qwen3-coder-free, nemotron-ultra-free, devstral]
    - gemma4-free: [qwen3-coder-free, nemotron-ultra-free, gemma4]
    - llama3.3-70b-free: [qwen3-coder-free, nemotron-ultra-free, ornith-35b]

general_settings:
  port: 4000
  host: 127.0.0.1

litellm_settings:
  return_response_headers: true
  drop_params: true
  cache: true
  cache_params:
    type: local
    ttl: 300

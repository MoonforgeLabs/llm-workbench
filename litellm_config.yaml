# LiteLLM Proxy 配置
# 实际可用模型清单 (已验证)

model_list:
  # ═══════════════════════════════════════════
  # PPIO — 通过 CC Switch (端口 15721)
  # 已验证可用: ppio/pa/gpt-5.5
  # ═══════════════════════════════════════════
  - model_name: gpt-5.5
    litellm_params:
      model: openai/ppio/pa/gpt-5.5
      api_key: os.environ/PPIO_API_KEY
      api_base: http://127.0.0.1:15721/v1

  # ═══════════════════════════════════════════
  # 小米代理 — Mimo 模型 (端口 model.mify.ai.srv)
  # 已验证可用: xiaomi/mimo-v2.5, xiaomi/mimo-v2.5-pro
  # ═══════════════════════════════════════════
  - model_name: mimo
    litellm_params:
      model: openai/xiaomi/mimo-v2.5
      api_key: os.environ/ANTHROPIC_API_KEY
      api_base: http://model.mify.ai.srv/anthropic/v1

  - model_name: mimo-pro
    litellm_params:
      model: openai/xiaomi/mimo-v2.5-pro
      api_key: os.environ/ANTHROPIC_API_KEY
      api_base: http://model.mify.ai.srv/anthropic/v1

  # ═══════════════════════════════════════════
  # Ollama — 本地免费 (端口 11434)
  # ═══════════════════════════════════════════
  - model_name: qwen3-coder
    litellm_params:
      model: ollama/qwen3-coder:30b
      api_base: http://127.0.0.1:11434

  - model_name: deepseek-r1
    litellm_params:
      model: ollama/deepseek-r1:32b
      api_base: http://127.0.0.1:11434

  - model_name: devstral
    litellm_params:
      model: ollama/devstral-small-2:latest
      api_base: http://127.0.0.1:11434

  - model_name: qwen3
    litellm_params:
      model: ollama/qwen3:32b
      api_base: http://127.0.0.1:11434

  - model_name: llama3.1
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: http://127.0.0.1:11434

  - model_name: qwen3-14b
    litellm_params:
      model: ollama/qwen3:14b
      api_base: http://127.0.0.1:11434

  - model_name: qwen2.5-7b
    litellm_params:
      model: ollama/qwen2.5:7b
      api_base: http://127.0.0.1:11434

  # ═══════════════════════════════════════════
  # DeepSeek API — 备选 (需 DEEPSEEK_API_KEY)
  # ═══════════════════════════════════════════
  - model_name: ds-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY

  - model_name: ds-reasoner
    litellm_params:
      model: deepseek/deepseek-reasoner
      api_key: os.environ/DEEPSEEK_API_KEY

# ═══════════════════════════════════════════
# 路由策略
# ═══════════════════════════════════════════
router_settings:
  routing_strategy: usage-based-routing-v2
  num_retries: 2
  timeout: 180

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  port: 4000
  host: 127.0.0.1

litellm_settings:
  return_response_headers: true
  cache: true
  cache_params:
    type: local
    ttl: 300
